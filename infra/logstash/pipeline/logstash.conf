input {
  beats {
    port         => 5044
    ssl_enabled  => false
  }
}

# Имя индекса НЕ должно быть logstash-* : в ES 8 встроенные шаблоны вешают data stream на logstash-*,
# тогда нужен op_type create, а плагин шлёт index → 400. Свой префикс = обычные индексы.

output {
  elasticsearch {
    hosts             => ["http://elasticsearch:9200"]
    data_stream       => false
    index             => "piis-docker-logs-%{+yyyy.MM.dd}"
    ilm_enabled       => false
    manage_template   => false
  }
}
