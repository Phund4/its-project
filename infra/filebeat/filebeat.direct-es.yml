# 袟邪锌邪褋薪芯泄 胁邪褉懈邪薪褌: 薪邪锌褉褟屑褍褞 胁 Elasticsearch (屑懈薪褍褟 Logstash), 械褋谢懈 褑械锌芯褔泻邪 Filebeat鈫扡ogstash 薪械 写邪褢褌 写芯泻褍屑械薪褌芯胁.
# 袠褋锌芯谢褜蟹芯胁邪薪懈械: 胁 docker-compose 褋屑芯薪褌懈褉芯胁邪褌褜 褝褌芯褌 褎邪泄谢 胁屑械褋褌芯 filebeat.yml:
#   - ./filebeat/filebeat.direct-es.yml:/usr/share/filebeat/filebeat.yml:ro
filebeat.inputs:
  - type: filestream
    id: docker-json-all
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*-json.log
    parsers:
      - container: ~
    prospector.scanner.fingerprint.enabled: false

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

setup.template.enabled: false
setup.ilm.enabled: false

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "traffic-docker-logs-%{+yyyy.MM.dd}"

logging.level: info
logging.to_stderr: true
