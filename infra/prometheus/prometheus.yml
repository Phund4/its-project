# Prometheus крутится в Docker; цели ниже — процессы на хосте (не контейнеры приложений).
# host.docker.internal задан в compose для prometheus (extra_hosts). Если сервис не запущен — target в DOWN, это нормально.
# Для полностью локального Prometheus без Docker замените targets на 127.0.0.1.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: data_ingestion
    static_configs:
      - targets: ["host.docker.internal:9091"]
  - job_name: ml_gateway
    static_configs:
      - targets: ["host.docker.internal:8092"]
  - job_name: analytics
    static_configs:
      - targets: ["host.docker.internal:8093"]
  - job_name: map_portal
    static_configs:
      - targets: ["host.docker.internal:8096"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: blackbox_http_health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8098/health
          - http://host.docker.internal:8099/health
          - http://host.docker.internal:8000/health
        labels:
          service: coordinator_ml
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
