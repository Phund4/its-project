# Локальный стек: Kafka, Elasticsearch + Kibana, ClickHouse, MinIO, Prometheus + Grafana.
name: traffic-infra

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - its
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "zookeeper-shell localhost:2181 ls / >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
      # Меньше heap по умолчанию — иначе на Docker Desktop с 2–4 GB RAM брокер часто падает при старте.
      KAFKA_HEAP_OPTS: -Xmx512M -Xms512M
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - its
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 40s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - its
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    networks:
      - its
    depends_on:
      elasticsearch:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    hostname: clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - its
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # S3-совместимое API (локальный объектный стор для кадров видео).
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9050:9000"
      - "9051:9001"
    networks:
      - its

  # RTSP server for camera simulation and ingest tests.
  mediamtx:
    profiles:
      - ingest
    image: bluenviron/mediamtx:1.9.3
    hostname: mediamtx
    ports:
      - "8554:8554"
    networks:
      - its

  # Synthetic camera publisher: pushes 2 test streams into mediamtx.
  video-source-sim:
    profiles:
      - ingest
    build:
      context: ./video-source-sim
      dockerfile: Dockerfile
    environment:
      RTSP_PUBLISH_BASE: rtsp://mediamtx:8554
      SIM_VIDEO_DIR: /videos
      SIM_FPS: "25"
      SIM_SIZE: "1280x720"
    volumes:
      - ../.data/videos:/videos:ro
    depends_on:
      - mediamtx
    networks:
      - its

  # Генератор телеметрии автобуса: gRPC на хост, где вручную запущен data-ingestion (:50051).
  bus-telemetry-generator:
    profiles:
      - telemetry
    build:
      context: ..
      dockerfile: data-generators/bus-telemetry/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BUS_TELEMETRY_GRPC_ADDR: host.docker.internal:50051
      BUS_TELEMETRY_ALL_CITIES: "true"
    networks:
      - its

  prometheus:
    image: prom/prometheus:v2.55.1
    hostname: prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - its

  grafana:
    image: grafana/grafana:11.3.0
    hostname: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - its

networks:
  its:
    name: traffic-its

volumes:
  zookeeper-data:
  kafka-data:
  es-data:
  clickhouse-data:
  minio-data:
  prometheus-data:
  grafana-data:
